<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sentiment Analysis | DJL</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="main-card">
                    <div class="header-section">
                        <h1>Sentiment Analysis</h1>
                        <p>Powered by DeepJavaLibrary</p>
                    </div>

                    <div class="input-section">
                        <label for="textInput">Analyze Sentiment</label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="textInput" 
                               placeholder="Type something and press Enter..."
                               onkeyup="getSentiment(event, this.value);">
                    </div>

                    <div id="answerPart" style="display: none;">
                        <div class="results-card">
                            <h5 class="text-center mb-4">Prediction Results</h5>
                            
                            <div class="sentiment-row">
                                <div class="sentiment-info">
                                    <span class="sentiment-label">😊 Positive</span>
                                    <span id="posValueLabel" class="sentiment-value">0%</span>
                                </div>
                                <div class="progress">
                                    <div id="positiveBar" class="progress-bar bg-success" role="progressbar" 
                                         style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                            
                            <div class="sentiment-row">
                                <div class="sentiment-info">
                                    <span class="sentiment-label">😞 Negative</span>
                                    <span id="negValueLabel" class="sentiment-value">0%</span>
                                </div>
                                <div class="progress">
                                    <div id="negativeBar" class="progress-bar bg-danger" role="progressbar" 
                                         style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="footer-section">
                        <small>
                            <span id="versionInfo">Initializing...</span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
